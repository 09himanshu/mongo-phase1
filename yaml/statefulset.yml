apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: mongodb
  labels:
    type: db
spec:
  serviceName: mongo-service
  replicas: 3
  selector:
    matchLabels:
      type: db
  template:
    metadata:
      labels:
        type: db
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          command:
            - mongod
            - "--replSet=rs0"
            - "--bind_ip=0.0.0.0"
          volumeMounts:
            - mountPath: /data/db
              name: mongodb-data
          
          startupProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 20
            successThreshold: 1
          
          livenessProbe:
            exec:
              command:
                - mongosh 
                - --eval 
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - |
                  try {
                    var status = rs.status();
                    var self = status.members.find(m => m.self === true);
                    if (!self) quit(1);
                    if (self.stateStr !== 'PRIMARY' && self.stateStr !== 'SECONDARY') quit(1);
                    quit(0);
                  } catch (e) {
                    var ping = db.adminCommand('ping');
                    if (ping.ok === 1) quit(0);
                    quit(1);
                  }
  
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 500Mi


