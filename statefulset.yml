apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: mongodb
  labels:
    type: db
spec:
  serviceName: mongo-service
  replicas: 3
  selector:
    matchLabels:
      type: db
  template:
    metadata:
      labels:
        type: db
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          command:
            - mongod
            - "--replSet=rs0"
            - "--bind_ip=0.0.0.0"
          volumeMounts:
            - mountPath: /data/db
              name: mongodb-data
  
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 500Mi


